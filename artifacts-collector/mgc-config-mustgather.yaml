config:
  obfuscate:
    - type: Regex
      target: FileContents
      regex: "sha256~[A-Za-z0-9_-]+"
    - type: Regex
      target: FileContents
      regex: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]+"
    - type: Regex
      target: FileContents
      regex: "(?i)Authorization:\\s+\\w+\\s+[A-Za-z0-9+/=_-]{20,}"
    - type: Regex
      target: FileContents
      regex: "(?i)(secret|httpSecret):\\s+[A-Za-z0-9+/=_-]{20,}"
  omit:
    - type: Kubernetes
      kubernetesResource:
        kind: "Secret"
    - type: Kubernetes
      kubernetesResource:
        kind: MachineConfig
        apiVersion: machineconfiguration.openshift.io/v1
    - type: Kubernetes
      kubernetesResource:
        kind: ControllerConfig
        apiVersion: machineconfiguration.openshift.io/v1
